# n8n encryption key must be set via environment (e.g. n8n/.env).
# Copy n8n/.env.example to n8n/.env and set N8N_ENCRYPTION_KEY.
version: "3.8"
services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - TZ=America/New_York
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - ../n8n_data:/home/node/.n8n
    restart: unless-stopped
